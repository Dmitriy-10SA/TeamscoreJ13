<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/index.css">
    <script src="js/index.js"></script>
    <title>Список задач</title>
</head>
<body>
<!-- Основной контент -->
<div class="main_div">
    <!-- Колонка с задачами статуса 'Сделать' -->
    <div id="do_task_column" class="column">
        <div class="main_sub_div">
            <div>
                <span>Сделать</span>
                <button id="open_modal_window_button">+</button>
            </div>
            <div id="do_task_cnt">0 задач</div>
        </div>
        <div id="do_task_container" class="task_container"></div>
    </div>
    <!-- Колонка с задачами статуса 'В работе' -->
    <div id="in_work_task_column" class="column">
        <div class="main_sub_div">
            <div>В работе</div>
            <div id="in_work_task_cnt">0 задач</div>
        </div>
        <div id="in_work_task_container" class="task_container"></div>
    </div>
    <!-- Колонка с задачами статуса 'Готово' -->
    <div id="done_task_column" class="column">
        <div class="main_sub_div">
            <div>Готово</div>
            <div id="done_task_cnt">0 задач</div>
        </div>
        <div id="done_task_container" class="task_container"></div>
    </div>
</div>
<!-- Модальное окно добавления/изменения задачи -->
<div id="modal_window" class="modal">
    <div class="modal_content">
        <span id="close_modal_window_button">&times;</span>
        <div id="modal_window_upper_text">Добавить задачу</div>
        <label for="task_title_in_modal_textarea"></label>
        <textarea id="task_title_in_modal_textarea" placeholder="Напишите задачу" rows="3"></textarea>
        <button id="add_task_button">Добавить</button>
    </div>
</div>
</body>
</html>

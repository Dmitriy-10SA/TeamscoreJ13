<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/index.css">
    <title>Список задач</title>
</head>
<body>
<div class="main_div">
    <div class="column">
        <div class="main_sub_div">
            <div>
                <span>Сделать</span>
                <button id="add_button">+</button>
            </div>
            <div id="do_task_cnt">0 задач</div>
        </div>
        <div id="do_task_container" class="task_container">
            <div class="task_item">
                <div>
                    <span>Задача 1</span>
                    <div>
                        <button>✏️</button>
                        <button>🗑️</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="column">
        <div class="main_sub_div">
            <div>В работе</div>
            <div id="in_work_task_cnt">0 задач</div>
        </div>
        <div id="in_work_task_container" class="task_container"></div>
    </div>
    <div class="column">
        <div class="main_sub_div">
            <div>Готово</div>
            <div id="done_task_cnt">0 задач</div>
        </div>
        <div id="done_task_container" class="task_container"></div>
    </div>
</div>
</body>
</html>
